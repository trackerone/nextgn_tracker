name: Codex Issue Implementation

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to process"
        required: true
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: codex-issue-implementation-${{ github.event.issue.number || inputs.issue_number || github.run_id }}
  cancel-in-progress: false

jobs:
  intake:
    name: Codex issue intake
    runs-on: ubuntu-latest

    steps:
      - name: Decide whether workflow should run
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            const payload = context.payload;

            let shouldRun = false;
            let issueNumber = null;
            let triggerSource = '';
            let commandText = '';

            if (eventName === 'issue_comment') {
              const commentBody = payload.comment?.body || '';
              const isPullRequestComment = !!payload.issue?.pull_request;
              const isIssueComment = !!payload.issue && !isPullRequestComment;
              const normalized = commentBody.trim();

              if (isIssueComment && normalized.startsWith('/codex implement')) {
                shouldRun = true;
                issueNumber = payload.issue.number;
                triggerSource = 'issue_comment';
                commandText = normalized;
              }
            }

            if (eventName === 'workflow_dispatch') {
              const rawIssueNumber = (payload.inputs?.issue_number || '').trim();
              if (rawIssueNumber) {
                shouldRun = true;
                issueNumber = Number(rawIssueNumber);
                triggerSource = 'workflow_dispatch';
                commandText = '/codex implement';
              }
            }

            core.setOutput('should_run', shouldRun ? 'true' : 'false');
            core.setOutput('issue_number', issueNumber ? String(issueNumber) : '');
            core.setOutput('trigger_source', triggerSource);
            core.setOutput('command_text', commandText);

            core.info(`should_run=${shouldRun}`);
            core.info(`issue_number=${issueNumber ?? ''}`);
            core.info(`trigger_source=${triggerSource}`);

      - name: Stop early when command does not match
        if: steps.gate.outputs.should_run != 'true'
        run: echo "No matching /codex implement trigger found. Exiting."

      - name: Read issue details
        if: steps.gate.outputs.should_run == 'true'
        id: issue
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = Number(process.env.ISSUE_NUMBER);

            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });

            const title = issue.title || '';
            const body = issue.body || '';
            const author = issue.user?.login || '';
            const labels = (issue.labels || [])
              .map(label => typeof label === 'string' ? label : label.name)
              .filter(Boolean);

            core.setOutput('title', title);
            core.setOutput('author', author);
            core.setOutput('labels', labels.join(', '));
            core.setOutput('body_b64', Buffer.from(body, 'utf8').toString('base64'));

      - name: Post structured intake comment
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          ISSUE_AUTHOR: ${{ steps.issue.outputs.author }}
          ISSUE_LABELS: ${{ steps.issue.outputs.labels }}
          ISSUE_BODY_B64: ${{ steps.issue.outputs.body_b64 }}
          TRIGGER_SOURCE: ${{ steps.gate.outputs.trigger_source }}
          COMMAND_TEXT: ${{ steps.gate.outputs.command_text }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const issueTitle = process.env.ISSUE_TITLE || '';
            const issueAuthor = process.env.ISSUE_AUTHOR || '';
            const issueLabels = process.env.ISSUE_LABELS || '';
            const triggerSource = process.env.TRIGGER_SOURCE || '';
            const commandText = process.env.COMMAND_TEXT || '';
            const issueBody = Buffer.from(process.env.ISSUE_BODY_B64 || '', 'base64').toString('utf8');

            const trimmedBody = issueBody.trim();
            const excerpt = trimmedBody.length > 1200
              ? `${trimmedBody.slice(0, 1200)}\n\n...[truncated]`
              : trimmedBody;

            const lines = [
              '## Codex implementation intake',
              '',
              `- Trigger: \`${triggerSource}\``,
              `- Actor: @${context.actor}`,
              `- Issue: #${issueNumber}`,
              `- Command: \`${commandText || '/codex implement'}\``,
              '',
              '### Snapshot',
              `- Title: ${issueTitle || '(empty)'}`,
              `- Author: @${issueAuthor || 'unknown'}`,
              `- Labels: ${issueLabels || '(none)'}`,
              '',
              '### Issue excerpt',
              excerpt ? excerpt : '_No issue body provided._',
              '',
              '### Guardrails',
              '- No auto-merge',
              '- No bypass of CI/review',
              '- Narrow, reviewable scope only',
              '- Existing quality gates remain mandatory',
              '',
              '### Next step',
              'Prepare a scoped Codex implementation run or manual follow-up from this intake.',
            ];

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: lines.join('\n'),
            });

      - name: Summary
        if: steps.gate.outputs.should_run == 'true'
        run: |
          echo "Codex intake comment posted for issue #${{ steps.gate.outputs.issue_number }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: ${{ steps.gate.outputs.trigger_source }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Actor: ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
