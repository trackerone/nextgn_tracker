name: CI Backend

on:
  push:
    paths:
      - app/**
      - bootstrap/**
      - config/**
      - database/**
      - routes/**
      - resources/**
      - tests/**
      - composer.json
      - composer.lock
      - phpunit.xml
      - phpunit.xml.dist
      - .github/workflows/ci-backend.yml
  pull_request:
    paths:
      - app/**
      - bootstrap/**
      - config/**
      - database/**
      - routes/**
      - resources/**
      - tests/**
      - composer.json
      - composer.lock
      - phpunit.xml
      - phpunit.xml.dist
      - .github/workflows/ci-backend.yml

jobs:
  feature-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          extensions: mbstring, bcmath, pdo_sqlite, sqlite3, gd

      - name: Install composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run feature tests
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
          CACHE_DRIVER: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array
        run: |
          mkdir -p database
          touch database/database.sqlite
          php artisan test --testsuite=Feature
