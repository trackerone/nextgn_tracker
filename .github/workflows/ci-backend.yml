name: CI Backend

on:
  workflow_dispatch:
  push:
    paths:
      - app/**
      - bootstrap/**
      - config/**
      - database/**
      - routes/**
      - resources/**
      - tests/**
      - composer.json
      - composer.lock
      - phpunit.xml
      - phpunit.xml.dist
      - .github/workflows/ci-backend.yml
  pull_request:
    paths:
      - app/**
      - bootstrap/**
      - config/**
      - database/**
      - routes/**
      - resources/**
      - tests/**
      - composer.json
      - composer.lock
      - phpunit.xml
      - phpunit.xml.dist
      - .github/workflows/ci-backend.yml

permissions:
  contents: read

jobs:
  feature-tests:
    runs-on: ubuntu-latest
    env:
      COMPOSER_NO_INTERACTION: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          extensions: mbstring, bcmath, pdo_sqlite, sqlite3, gd

      - name: Resolve Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-backend-composer-php83-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-backend-composer-php83-

      - name: Configure Composer GitHub OAuth
        run: composer config --global github-oauth.github.com "${{ github.token }}"

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run feature tests
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
          CACHE_DRIVER: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array
        run: |
          mkdir -p database
          touch database/database.sqlite
          php artisan test --testsuite=Feature
