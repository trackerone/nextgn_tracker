name: Codex Nightly Maintenance

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  maintenance-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          extensions: ctype, curl, dom, fileinfo, filter, gd, iconv, json, mbstring, openssl, pdo, session, tokenizer, xml, intl, pcntl, bcmath, pdo_sqlite, sqlite3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install JS dependencies
        run: npm ci

      - name: Validate composer manifest
        run: composer validate --strict

      - name: Run Pint checks
        run: composer lint

      - name: Run static analysis
        run: composer analyse

      - name: Build frontend assets
        run: npm run build

      - name: Open maintenance issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `[Maintenance] Nightly checks failed on ${today}`;

            const existing = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "${title}"`,
              per_page: 1,
            });

            if (existing.data.total_count > 0) {
              core.info('Open maintenance issue already exists.');
              return;
            }

            const body = [
              'Nightly Codex maintenance checks failed.',
              '',
              `- Workflow run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '- This report is informational and does not auto-merge changes.',
              '- Investigate failing step and open a scoped fix PR.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci', 'maintenance'],
            });
